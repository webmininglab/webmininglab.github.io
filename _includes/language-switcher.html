<div class="language-switcher">

  <span class="lang-btn current">🇬🇧 English</span>

  <a class="lang-btn"
     href="https://translate.google.com/translate?sl=auto&tl=zh-CN&u={{ page.url | absolute_url | url_encode }}"
     target="_blank"
     rel="noopener">
    🇨🇳 Chinese
  </a>

  <a class="lang-btn"
     href="https://translate.google.com/translate?sl=auto&tl=en&u={{ page.url | absolute_url | url_encode }}"
     target="_blank"
     rel="noopener">
    🌐 Translate
  </a>

</div>
